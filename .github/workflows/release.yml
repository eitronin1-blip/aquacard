name: Release

# Собирает Android APK и iOS IPA при пуше тега вида v1.2.3
# и публикует оба артефакта в GitHub Release.
#
# IPA собирается БЕЗ подписи (CODE_SIGNING_ALLOWED=NO) — она предназначена
# для установки через SideStore/AltStore, которые переподписывают её
# вашим Apple ID на устройстве.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --console=plain

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk "dist/AquaCard-${GITHUB_REF_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk

  ios:
    name: Build iOS IPA (unsigned)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app || true

      - name: Build unsigned .app
        run: |
          xcodebuild \
            -project iosApp/AquaCard.xcodeproj \
            -scheme AquaCard \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/ios \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package .ipa
        run: |
          mkdir -p dist Payload
          APP_PATH="$(find build/ios -name 'AquaCard.app' -type d | head -1)"
          test -n "$APP_PATH" || { echo "AquaCard.app not found"; exit 1; }
          cp -R "$APP_PATH" Payload/
          zip -r "dist/AquaCard-${GITHUB_REF_NAME}.ipa" Payload >/dev/null
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: dist/*.ipa

  release:
    name: Publish GitHub Release
    needs: [android, ios]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## AquaCard ${{ github.ref_name }}

            | Платформа | Файл | Установка |
            |-----------|------|-----------|
            | Android   | `AquaCard-${{ github.ref_name }}.apk` | Скачать и открыть на телефоне (включите «Установка из неизвестных источников»). |
            | iOS       | `AquaCard-${{ github.ref_name }}.ipa` | Через [SideStore](https://sidestore.io) — переподпишет вашим Apple ID. См. README. |

            > IPA не подписана: устанавливается только через SideStore/AltStore, не напрямую.
